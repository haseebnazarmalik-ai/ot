<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>OT Tracker Pro</title>
    <style>
        :root { --primary: #1e3a8a; --gradient: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #334155; }

        /* Login Screen - Initially Hidden if user exists in local storage */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gradient);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; color: white;
        }
        .login-box { 
            background: rgba(255,255,255,0.15); padding: 40px 25px; border-radius: 28px; 
            backdrop-filter: blur(15px); text-align: center; width: 85%; max-width: 350px; 
            border: 1px solid rgba(255,255,255,0.2); 
        }
        .google-btn { 
            width: 100%; padding: 15px; margin-top: 25px; border-radius: 14px; border: none; 
            background: #fff; color: #444; font-weight: 700; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px;
        }

        /* Main Dashboard */
        #mainApp { display: none; padding-bottom: 120px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: var(--gradient); color: white; position: sticky; top: 0; z-index: 100; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .app-container { padding: 10px 15px; max-width: 600px; margin: auto; }
        .selector-container { display: flex; gap: 10px; margin: 15px 0; }
        select { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; font-weight: 600; background: #fff; outline: none; }

        .top-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .mini-card { background: #fff; padding: 15px; border-radius: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .mini-card span { font-size: 20px; font-weight: 800; color: var(--primary); display: block; }

        .list-container { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .row { display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 2fr; padding: 14px 5px; border-bottom: 1px solid #f8fafc; align-items: center; text-align: center; font-size: 14px; }
        .row input { width: 45px; padding: 8px; border: 1px solid #cbd5e1; border-radius: 10px; text-align: center; font-weight: 700; }

        .final-summary { margin-top: 20px; background: #eff6ff; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid #dbeafe; }
        .grand-pkr { font-size: 34px; font-weight: 900; color: #2563eb; }

        .save-all-btn { position: fixed; bottom: 30px; right: 20px; padding: 18px 30px; background: #16a34a; color: white; border: none; border-radius: 50px; font-weight: 800; z-index: 999; box-shadow: 0 10px 25px rgba(22,163,74,0.4); cursor: pointer; }
        .settings-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 1001; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 28px; width: 80%; max-width: 350px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h1 style="margin:0; font-size:26px;">OT Tracker Pro</h1>
        <p style="opacity:0.8; font-size:14px;">Instant Sync Dashboard</p>
        <button class="google-btn" onclick="window.googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Sign in with Google
        </button>
    </div>
</div>

<div id="mainApp">
    <div class="header">
        <div>
            <div style="font-weight:800; font-size:18px;">DASHBOARD</div>
            <div id="userName" style="font-size:11px; opacity:0.9;">User</div>
        </div>
        <button class="settings-btn" onclick="toggleModal()">⚙️</button>
    </div>

    <div class="app-container">
        <div class="selector-container">
            <select id="monthSelect"></select>
            <select id="yearSelect"></select>
        </div>
        <div class="top-summary">
            <div class="mini-card"><div>Total Hours</div><span id="totalHrs">0</span></div>
            <div class="mini-card"><div>OT SAR</div><span id="totalOT">0.00</span></div>
        </div>
        <div class="list-container" id="calendarRows"></div>
        <div class="final-summary">
            <div style="font-weight: 800; color: #1e40af; font-size: 11px;">GRAND TOTAL</div>
            <div style="font-size: 22px; font-weight: 800;" id="grandSAR">0.00 SAR</div>
            <div class="grand-pkr"><small style="font-size:16px;">PKR</small> <span id="grandPKR">0.00</span></div>
        </div>
        <button class="save-all-btn" onclick="window.saveUserData()">☁️ SYNC DATA</button>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Settings</h3>
        <input type="number" id="baseSalary" value="3000" oninput="calculateAll()" placeholder="Salary">
        <input type="number" id="otRate" value="17.72" step="0.01" oninput="calculateAll()" placeholder="OT Rate">
        <input type="number" id="pkrRate" value="75.50" step="0.1" oninput="calculateAll()" placeholder="PKR Rate">
        <button onclick="toggleModal()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:14px; margin-top:10px;">DONE</button>
        <button onclick="window.logout()" style="width:100%; padding:14px; background:#ef4444; color:white; border:none; border-radius:14px; margin-top:10px;">LOGOUT</button>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAywmVNaLkyudJelZ-Gdx6gL1hydzxe2cg",
    authDomain: "haseeb-984fc.firebaseapp.com",
    projectId: "haseeb-984fc",
    databaseURL: "https://haseeb-984fc-default-rtdb.firebaseio.com",
    appId: "1:868884894390:web:09f2edf8a4ccebe909cc17"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // --- FAST LOAD LOGIC ---
  // App khulne se pehle check karo ke kya user pehle se login tha?
  const cachedUser = localStorage.getItem('ot_user_login');
  if (cachedUser) {
      document.getElementById('mainApp').style.display = 'block';
      document.getElementById('userName').innerText = cachedUser;
  } else {
      document.getElementById('loginScreen').style.display = 'flex';
  }

  window.googleLogin = () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider).catch(err => alert(err.message));
  };

  window.logout = () => {
      localStorage.removeItem('ot_user_login');
      signOut(auth).then(() => location.reload());
  };

  onAuthStateChanged(auth, (user) => {
      if (user) {
          localStorage.setItem('ot_user_login', user.displayName || user.email);
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('mainApp').style.display = 'block';
          window.loadUserData();
      } else {
          localStorage.removeItem('ot_user_login');
          document.getElementById('loginScreen').style.display = 'flex';
          document.getElementById('mainApp').style.display = 'none';
      }
  });

  window.saveUserData = async () => {
      const user = auth.currentUser;
      if (!user) return;
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;
      const overtime = {};
      document.querySelectorAll('.ot-input').forEach(input => { if(input.value) overtime[input.dataset.id] = input.value; });
      const data = {
          settings: { baseSalary: document.getElementById('baseSalary').value, otRate: document.getElementById('otRate').value, pkrRate: document.getElementById('pkrRate').value },
          overtime: overtime
      };
      try {
          await set(ref(db, `users/${user.uid}/${year}/${month}`), data);
          alert("Synced! ✅");
      } catch (e) { alert("Sync Error!"); }
  };

  window.loadUserData = () => {
      const user = auth.currentUser;
      if (!user) return;
      const year = document.getElementById('yearSelect').value;
      const month = document.getElementById('monthSelect').value;
      if(window.initCalendar) window.initCalendar();
      onValue(ref(db, `users/${user.uid}/${year}/${month}`), (snapshot) => {
          const val = snapshot.val();
          if (val) {
              if(val.settings) {
                  document.getElementById('baseSalary').value = val.settings.baseSalary;
                  document.getElementById('otRate').value = val.settings.otRate;
                  document.getElementById('pkrRate').value = val.settings.pkrRate;
              }
              if(val.overtime) {
                  for(let key in val.overtime) {
                      const input = document.querySelector(`[data-id="${key}"]`);
                      if(input) input.value = val.overtime[key];
                  }
              }
          }
          if(window.calculateAll) window.calculateAll();
      }, { onlyOnce: true });
  };

  document.getElementById('monthSelect').addEventListener('change', window.loadUserData);
  document.getElementById('yearSelect').addEventListener('change', window.loadUserData);
</script>

<script>
    window.initCalendar = function() {
        const month = parseInt(document.getElementById('monthSelect').value);
        const year = parseInt(document.getElementById('yearSelect').value);
        if(!month) return;
        const days = new Date(year, month, 0).getDate();
        let html = '<div class="row" style="background:#f1f5f9; font-weight:800; font-size:11px;"><div>DATE</div><div>DAY</div><div>HRS</div><div>SAR</div></div>';
        for (let d = 1; d <= days; d++) {
            const dayName = new Date(year, month - 1, d).toLocaleDateString('en-US', { weekday: 'short' });
            html += `<div class="row">
                <div style="font-weight:700;">${d}/${month}</div>
                <div style="color:${dayName==='Sun'?'#ef4444':'#64748b'}; font-weight:700;">${dayName}</div>
                <div><input type="text" inputmode="decimal" class="ot-input" data-id="day-${d}" oninput="calculateAll()"></div>
                <div id="amt-${d}" style="font-weight:800; color:#16a34a">0.00</div>
            </div>`;
        }
        document.getElementById('calendarRows').innerHTML = html;
    };

    window.calculateAll = function() {
        const salary = parseFloat(document.getElementById('baseSalary').value) || 0;
        const rate = parseFloat(document.getElementById('otRate').value) || 0;
        const pkr = parseFloat(document.getElementById('pkrRate').value) || 0;
        let tHrs = 0;
        document.querySelectorAll('.ot-input').forEach((input, i) => {
            const h = parseFloat(input.value) || 0;
            tHrs += h;
            const amtDiv = document.getElementById(`amt-${i+1}`);
            if(amtDiv) amtDiv.innerText = (h * rate).toFixed(2);
        });
        const otSAR = tHrs * rate;
        document.getElementById('totalHrs').innerText = tHrs;
        document.getElementById('totalOT').innerText = otSAR.toFixed(2);
        document.getElementById('grandSAR').innerText = (salary + otSAR).toFixed(2) + " SAR";
        document.getElementById('grandPKR').innerText = ((salary + otSAR) * pkr).toLocaleString(undefined, {minimumFractionDigits: 2});
    };

    function setupSelectors() {
        const m = document.getElementById('monthSelect'), y = document.getElementById('yearSelect'), now = new Date();
        const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
        months.forEach((name, i) => {
            let opt = new Option(name, i + 1);
            if(i === now.getMonth()) opt.selected = true;
            m.add(opt);
        });
        for(let i=0; i<5; i++) y.add(new Option(now.getFullYear()-i, now.getFullYear()-i));
    }

    window.toggleModal = function() {
        const m = document.getElementById('settingsModal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    window.addEventListener('DOMContentLoaded', () => {
        setupSelectors();
        window.initCalendar();
    });
</script>
</body>
</html>
